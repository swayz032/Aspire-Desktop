name: Desktop CI

on:
  pull_request:
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'server/**'
      - 'services/**'
      - 'hooks/**'
      - 'types/**'
      - '__tests__/**'
      - 'docs/locks/**'
      - 'package.json'
      - 'package-lock.json'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/ci.yml'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'server/**'
      - 'services/**'
      - '__tests__/**'
      - 'docs/locks/**'
      - 'package.json'
      - 'package-lock.json'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/ci.yml'
      - 'scripts/**'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npx expo lint 2>&1 | tail -20 || true

      - name: Type check (server)
        run: npx tsc --noEmit server/index.ts 2>&1 | grep -v "node_modules" | tail -20 || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npx jest --ci --passWithNoTests --forceExit --timeout=30000 2>&1 | tail -30

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://qtuehjqlcmfcascqjjhc.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-ci
      EXPO_PUBLIC_ASPIRE_RELEASE: ${{ github.sha }}
      EXPO_PUBLIC_SENTRY_ENVIRONMENT: production
      ASPIRE_RELEASE: ${{ github.sha }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT_DESKTOP_CLIENT: ${{ vars.SENTRY_PROJECT_DESKTOP_CLIENT || vars.SENTRY_PROJECT_ASPIRE_DESKTOP_CLIENT || vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run web:build 2>&1 | tail -20

  visuals-lock:
    # Enforces the Visuals Tab Design Lock v1.0
    # (see docs/locks/VISUALS_TAB_LOCK.md). Fails fast if any locked
    # anti-pattern reappears in the source — e.g., the left "VIEW FROM"
    # cluster comes back, Street View Pano regresses to zoom 1, the
    # positional photo classifier reappears, or one of the 15 required
    # PropertyData.facts fields gets dropped from the type contract.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Visuals lock regression suite
        run: npm run check:visuals-lock

  type-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check type drift
        run: |
          if [ -f "types/supabase.generated.ts" ]; then
            echo "Supabase types present - checking for uncommitted drift..."
            if ! git diff --quiet types/supabase.generated.ts 2>/dev/null; then
              echo "DRIFT: supabase.generated.ts has uncommitted changes"
              exit 1
            fi
            echo "No drift detected."
          fi

  playwright-smoke-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public smoke robots
        env:
          ASPIRE_E2E_MODE: public
          ASPIRE_SYNTHETIC_ENV: ci
          E2E_PORT: '4173'
        run: npx playwright test e2e/public-smoke.spec.ts

      - name: Upload public smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-public
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  playwright-smoke-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated smoke robots
        env:
          ASPIRE_E2E_MODE: auth
          ASPIRE_SYNTHETIC_ENV: ci
          E2E_PORT: '4174'
        run: npx playwright test e2e/auth-smoke.spec.ts

      - name: Upload authenticated smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-auth
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
